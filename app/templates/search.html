{% extends "base.html" %}

{% block title %}Search Connections{% endblock %}

{% block content %}
<div class="search-container">
    <div id="loading-section" class="search-card {% if connections_loaded %}loading-hidden{% else %}loading-active{% endif %}">
        <div class="spinner"></div>
        <p>Loading your connections...</p>
    </div>

    <div id="search-section" class="search-panel {% if connections_loaded %}{% else %}loading-hidden{% endif %}">
        <div class="search-header">
            <h2>Search Your Connections</h2>
            <p>Find VCs you're connected to through your network</p>
        </div>

        <div class="search-tabs-pill">
            <button class="tab-btn-pill active" onclick="switchTab('person-search')">Person → VCs</button>
            <button class="tab-btn-pill" onclick="switchTab('vc-search')">VC → People</button>
        </div>

        <div id="person-search" class="tab-content active">
            <h3>Search for a Person in Your Network</h3>
            <input type="text" id="person-input" placeholder="e.g., Mircea Dinc..." class="search-input" oninput="filterPeople()">
            <div id="person-list" class="search-results"></div>
        </div>

        <div id="vc-search" class="tab-content">
            <h3>Search for a VC</h3>
            <input type="text" id="vc-input" placeholder="e.g., Breakthrough Energy Ventures..." class="search-input" oninput="filterVCs()">
            <div id="vc-list" class="search-results"></div>
        </div>
    </div>

    <div id="results-section" class="search-card loading-hidden">
        <button class="btn btn-secondary" onclick="backToSearch()">← Back</button>
        <div id="results-content"></div>
    </div>
</div>


<script>
    let allPeople = [];
    let allVCs = [];
    let loadingStarted = false;

    function roundPillClass(round) {
        if (!round) return 'pill pill-other';
        const r = round.toLowerCase();
        if (r.includes('seed') || r.includes('pre-seed') || r.includes('angel')) return 'pill pill-seed';
        if (r.includes('series a')) return 'pill pill-series-a';
        if (r.includes('series b')) return 'pill pill-series-b';
        if (r.includes('series c') || r.includes('series d') || r.includes('series e')) return 'pill pill-series-c';
        return 'pill pill-other';
    }

    function initializeSearch() {
        const loadingSection = document.getElementById('loading-section');

        if (!loadingStarted) {
            loadingStarted = true;
            // Load data in background
            loadData();

            // If connections already loaded, show search immediately
            if (loadingSection.classList.contains('loading-hidden')) {
                document.getElementById('search-section').classList.remove('loading-hidden');
            } else {
                // Otherwise wait 5 seconds before showing search
                setTimeout(function() {
                    loadingSection.classList.add('loading-hidden');
                    document.getElementById('search-section').classList.remove('loading-hidden');
                }, 5000);
            }
        }
    }

    let vcWebsites = {}; // Cache VC websites for lookup

    function loadData() {
        fetch('/api/search-people')
            .then(r => r.json())
            .then(data => {
                allPeople = data.people || [];
            });

        fetch('/api/search-vcs')
            .then(r => r.json())
            .then(data => {
                allVCs = data.vcs || [];
                // Build VC website cache
                allVCs.forEach(vc => {
                    if (vc.website) {
                        vcWebsites[vc.name] = vc.website;
                    }
                });
            });
    }

    function switchTab(tab) {
        // Hide all tabs
        document.getElementById('person-search').classList.remove('active');
        document.getElementById('vc-search').classList.remove('active');

        // Remove active class from all buttons
        document.querySelectorAll('.tab-btn-pill').forEach(btn => btn.classList.remove('active'));

        // Show selected tab
        document.getElementById(tab).classList.add('active');
        event.target.classList.add('active');

        // Clear search
        document.getElementById('person-input').value = '';
        document.getElementById('vc-input').value = '';
        document.getElementById('person-list').innerHTML = '';
        document.getElementById('person-list').classList.remove('has-results');
        document.getElementById('vc-list').innerHTML = '';
        document.getElementById('vc-list').classList.remove('has-results');
    }

    function filterPeople() {
        const input = document.getElementById('person-input').value.toLowerCase();
        const list = document.getElementById('person-list');

        if (!input) {
            list.classList.remove('has-results');
            list.innerHTML = '';
            return;
        }

        const filtered = allPeople.filter(p => p.name.toLowerCase().includes(input));

        if (filtered.length === 0) {
            list.classList.remove('has-results');
            list.innerHTML = '<div class="search-results empty">No people found</div>';
            return;
        }

        list.classList.add('has-results');

        list.innerHTML = '<div>' + filtered.map(person => {
            // Build per-person VC map
            const vcsMap = new Map();
            (person.companies_founded || []).forEach(company => {
                (company.investors || []).forEach(inv => {
                    if (inv.vc_name && !(inv.round || '').includes('Grant')) {
                        if (!vcsMap.has(inv.vc_name)) vcsMap.set(inv.vc_name, []);
                        if (!vcsMap.get(inv.vc_name).includes(inv.round))
                            vcsMap.get(inv.vc_name).push(inv.round);
                    }
                });
            });
            const connectedVCs = Array.from(vcsMap.entries()).sort((a, b) => a[0].localeCompare(b[0]));

            const vcsHtml = connectedVCs.length > 0
                ? '<div style="margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.4rem;">' +
                  connectedVCs.map(([vc, rounds]) => {
                      const roundText = rounds.filter(r => !r.includes('Grant')).join(', ');
                      const vcLink = vcWebsites[vc] || `https://www.google.com/search?q=${encodeURIComponent(vc + ' VC')}`;
                      return `<span class="vc-chip" onclick="event.stopPropagation(); searchVCPeople('${vc.replace(/'/g, "\\'")}')">
                          <span class="vc-chip-name"><a href="${vcLink}" target="_blank" onclick="event.stopPropagation()">${vc}</a></span>
                          ${roundText ? `<span class="vc-chip-round ${roundPillClass(rounds[0]).split(' ')[1]}">${roundText}</span>` : ''}
                      </span>`;
                  }).join('') +
                  '</div>'
                : '';

            return `
            <div class="result-item" onclick="searchPersonVCs('${person.name.replace(/'/g, "\\'")}')">
                <h4>${person.name}</h4>
                <p><a href="${person.linkedin}" target="_blank">LinkedIn</a></p>
                ${person.companies_founded && person.companies_founded.length > 0 ?
                    `<p>${person.companies_founded.length} company/companies</p>` : ''}
                ${vcsHtml}
            </div>`;
        }).join('') + '</div>';
    }

    function getVCLink(vc) {
        if (vc.website) {
            return vc.website;
        }
        return `https://www.google.com/search?q=${encodeURIComponent(vc.name + ' VC')}`;
    }

    function filterVCs() {
        const input = document.getElementById('vc-input').value.toLowerCase();
        const list = document.getElementById('vc-list');

        if (!input) {
            list.classList.remove('has-results');
            list.innerHTML = '';
            return;
        }

        const filtered = allVCs.filter(vc => vc.name.toLowerCase().includes(input));

        if (filtered.length === 0) {
            list.classList.remove('has-results');
            list.innerHTML = '<div class="search-results empty">No VCs found</div>';
            return;
        }

        list.classList.add('has-results');
        list.innerHTML = '<div>' + filtered.map(vc => `
            <div class="result-item" onclick="searchVCPeople('${vc.name.replace(/'/g, "\\'")}')">
                <h4><a href="${getVCLink(vc)}" target="_blank" onclick="event.stopPropagation()">${vc.name}</a></h4>
                <p>📍 ${vc.hq || 'Location TBD'}</p>
                <p>${vc.intros_available.length} intro(s) available</p>
            </div>
        `).join('') + '</div>';
    }

    function searchPersonVCs(personName) {
        document.getElementById('search-section').classList.add('loading-hidden');
        document.getElementById('results-section').classList.remove('loading-hidden');
        document.getElementById('results-content').innerHTML = '<p style="text-align: center;">Loading...</p>';

        const person = allPeople.find(p => p.name === personName);
        if (!person) return;

        let html = `<h3>${personName}</h3>`;
        html += `<p><a href="${person.linkedin}" target="_blank">View LinkedIn Profile</a></p>`;

        if (!person.companies_founded || person.companies_founded.length === 0) {
            html += '<p>No founded companies found</p>';
        } else {
            html += '<h4 style="margin-top: 1.5rem; margin-bottom: 1rem;">Companies & VCs:</h4>';
            person.companies_founded.forEach(company => {
                html += `
                    <div class="company-block">
                        <h4>${company.name}</h4>
                        <p>${company.description || ''}</p>
                        ${company.investors && company.investors.length > 0 ? `
                            <h5 style="margin-top: 0.75rem; margin-bottom: 0.5rem;">Investors:</h5>
                            <ul class="vc-list">
                                ${company.investors.map(inv => {
                                    const vcLink = vcWebsites[inv.vc_name] || `https://www.google.com/search?q=${encodeURIComponent(inv.vc_name + ' VC')}`;
                                    return `<li><strong><a href="${vcLink}" target="_blank" onclick="event.stopPropagation()">${inv.vc_name}</a></strong> — ${inv.round}</li>`;
                                }).join('')}
                            </ul>
                        ` : ''}
                    </div>
                `;
            });
        }

        document.getElementById('results-content').innerHTML = html;
    }

    function searchVCPeople(vcName) {
        document.getElementById('search-section').classList.add('loading-hidden');
        document.getElementById('results-section').classList.remove('loading-hidden');
        document.getElementById('results-content').innerHTML = '<p style="text-align: center;">Loading...</p>';

        fetch(`/api/search-vc-people?vc=${encodeURIComponent(vcName)}`)
            .then(r => r.json())
            .then(data => displayVCResults(vcName, data))
            .catch(e => {
                document.getElementById('results-content').innerHTML = '<p style="color: red;">Error loading results</p>';
            });
    }

    function displayVCResults(vcName, data) {
        const vcLink = vcWebsites[vcName] || `https://www.google.com/search?q=${encodeURIComponent(vcName + ' VC')}`;
        let html = `<h3>Connections to <a href="${vcLink}" target="_blank" onclick="event.stopPropagation()">${vcName}</a></h3>`;

        if (!data.connections || data.connections.length === 0) {
            html += '<p>No direct connections to this VC</p>';
        } else {
            html += `<p><strong>${data.connections.length}</strong> connection(s) found:</p>`;
            data.connections.forEach(conn => {
                html += `
                    <div class="company-block">
                        <h4>${conn.person_name}</h4>
                        <p><a href="${conn.person_linkedin}" target="_blank">LinkedIn</a></p>
                        <p><strong>Company:</strong> ${conn.company_name}</p>
                        <p><strong>Round:</strong> ${conn.round}</p>
                    </div>
                `;
            });
        }

        document.getElementById('results-content').innerHTML = html;
    }

    function backToSearch() {
        document.getElementById('results-section').classList.add('loading-hidden');
        document.getElementById('search-section').classList.remove('loading-hidden');
        document.getElementById('person-input').value = '';
        document.getElementById('vc-input').value = '';
        document.getElementById('person-list').innerHTML = '';
        document.getElementById('vc-list').innerHTML = '';
    }

    document.addEventListener('DOMContentLoaded', initializeSearch);
</script>
{% endblock %}
